<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Crystal Visualizer</title>
<style>
  body { margin: 0; overflow: hidden; font-family: Arial; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    padding: 10px;
    color: white;
    border-radius: 8px;
  }
</style>
</head>
<body>

<div id="ui">
  <button onclick="generateDiamond()">Diamond</button>
  <button onclick="generateGraphite()">Graphite</button>
  <b>Crystal Visualizer</b><br>
  <input type="file" id="fileInput"><br>
  <button onclick="generateNaCl()">Load NaCl</button>
  <button onclick="clearScene()">Clear</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// Diamond lattice
function generateDiamond() {
  clearScene();

  let atoms = [];
  let a = 2; // lattice constant

  let positions = [
    [0,0,0],
    [0.25,0.25,0.25],
    [0.5,0.5,0],
    [0.75,0.75,0.25],
    [0.5,0,0.5],
    [0.75,0.25,0.75],
    [0,0.5,0.5],
    [0.25,0.75,0.75]
  ];

  positions.forEach(p=>{
    atoms.push(createAtom(p[0]*a, p[1]*a, p[2]*a, "C"));
  });

  createBonds(atoms);
  createUnitCell(a);
}

// Graphite lattice (layered hexagonal)
function generateGraphite() {
  clearScene();

  let atoms = [];
  let a = 2;   // in-plane spacing
  let c = 3;   // layer spacing

  let positions = [
    [0,0,0],
    [1/3,2/3,0],
    [0,0,0.5],
    [1/3,2/3,0.5]
  ];

  positions.forEach(p=>{
    atoms.push(createAtom(p[0]*a, p[1]*a, p[2]*c, "C"));
  });

  createBonds(atoms);
  createUnitCell(3);
}
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(5,5,5);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Orbit controls (smooth interaction)
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// Lighting
const light1 = new THREE.PointLight(0xffffff, 1);
light1.position.set(10,10,10);
scene.add(light1);

const light2 = new THREE.AmbientLight(0x404040);
scene.add(light2);

let objects = [];

// Colors
// Colors for different atoms
const colors = {
  Na: 0x0000ff,   // blue
  Cl: 0x00ff00,   // green
  C: 0x222222     // dark grey for carbon
};

// Atom
function createAtom(x,y,z,type="Na") {
  const geo = new THREE.SphereGeometry(0.3, 32, 32);
  const mat = new THREE.MeshPhongMaterial({color: colors[type] || 0xffaa00});
  const mesh = new THREE.Mesh(geo, mat);

  mesh.position.set(x,y,z);
  scene.add(mesh);
  objects.push(mesh);

  // ✅ FIX: call AFTER mesh is created
  createLabel(type, mesh.position);

  return mesh;
}

// Bond
function createBond(a,b) {
  const mat = new THREE.LineBasicMaterial({color:0xffffff});
  const points = [a.position, b.position];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  objects.push(line);
}

// Distance-based bonding
function createBonds(atoms) {
  for (let i=0;i<atoms.length;i++){
    for (let j=i+1;j<atoms.length;j++){
      let d = atoms[i].position.distanceTo(atoms[j].position);
      if (d < 1.2) { // threshold
        createBond(atoms[i], atoms[j]);
      }
    }
  }
}
function createLabel(text, position) {
  const canvas = document.createElement("canvas");
  canvas.width = 128;
  canvas.height = 64;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "white";
  ctx.font = "28px Arial";
  ctx.fillText(text, 10, 40);

  const texture = new THREE.CanvasTexture(canvas);
  const material = new THREE.SpriteMaterial({ map: texture });
  const sprite = new THREE.Sprite(material);

  sprite.scale.set(1.5, 0.75, 1);
  sprite.position.copy(position);

  scene.add(sprite);
  objects.push(sprite);
}

// Unit cell box
function createUnitCell(size=2) {
  const geo = new THREE.BoxGeometry(size,size,size);
  const edges = new THREE.EdgesGeometry(geo);
  const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color:0xffffff}));
  scene.add(line);
  objects.push(line);
}

// Clear
function clearScene() {
  objects.forEach(o => scene.remove(o));
  objects = [];
}

// Example: NaCl structure
function generateNaCl() {
  clearScene();

  let atoms = [];
  let positions = [
    [0,0,0,"Na"],
    [1,1,1,"Cl"]
  ];

  positions.forEach(p=>{
    atoms.push(createAtom(p[0],p[1],p[2],p[3]));
  });

  createBonds(atoms);
  createUnitCell(2);
}

// CIF loader (improved basic)
document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event) {
    parseCIF(event.target.result);
  };

  reader.readAsText(file);
});

function parseCIF(text) {
  clearScene();

  const lines = text.split("\n");
  let atoms = [];

  lines.forEach(line=>{
    let p = line.trim().split(/\s+/);
    if (p.length>=4 && !isNaN(p[1])) {
      atoms.push(createAtom(
        parseFloat(p[1])*3,
        parseFloat(p[2])*3,
        parseFloat(p[3])*3,
        p[0]
      ));
    }
  });

  createBonds(atoms);
  createUnitCell(3);
}

// Render loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

</script>
</body>
</html>
